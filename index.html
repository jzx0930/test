<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刷牙教學 - 準心導引與動作偵測</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #222;
      color: white;
      margin: 0;
      padding: 10px;
    }
    
    .ui-panel {
      width: 640px;
      padding: 15px;
      background-color: #333;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .status-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .status-lamp {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background-color: #555;
      margin-right: 10px;
    }
    .status-lamp.active {
      background-color: #00ffcc;
      box-shadow: 0 0 8px #00ffcc;
    }
    
    .progress-container {
      width: 100%;
      height: 30px;
      background-color: #555;
      border-radius: 15px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      transition: width 0.1s;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-family: monospace;
      font-size: 16px;
      color: #00ffcc;
    }

    .container {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      background-color: #000;
    }
    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* 鏡像翻轉 */
    }

    #loading-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>🦷 刷牙準心偵測</h2>
  
  <div class="ui-panel">
    <div class="status-area">
      <div style="display: flex; align-items: center; font-size: 18px; font-weight: bold;">
        <div class="status-lamp" id="status-lamp"></div>
        狀態：<span id="status-text" style="color: #ffcc00;">等待模型載入...</span>
      </div>
      <span id="progress-percent" style="font-size: 18px; color: #aaa;">0%</span>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div class="container">
    <div id="loading-msg">⏳ AI 模型載入中...</div>
    <video id="input_video" autoplay playsinline style="display:none;"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');
    const statusLamp = document.getElementById('status-lamp');
    const loadingMsg = document.getElementById('loading-msg');
    const progressPercent = document.getElementById('progress-percent');

    let lastImageData = null;
    let brushProgress = 0;
    const MAX_PROGRESS = 100;
    const MOTION_THRESHOLD = 15000; 
    let isAligned = false; 

    const guideOval = {
      cx: 320,  
      cy: 220,  
      rx: 120,  
      ry: 160   
    };

    const mouthIndices = [0, 13, 14, 17, 37, 39, 40, 61, 78, 80, 81, 82, 84, 87, 88, 91, 95, 146, 178, 181, 191, 267, 269, 270, 291, 308, 310, 311, 312, 314, 317, 318, 321, 324, 375, 402, 405, 415];

    function drawStaticGuide() {
      canvasCtx.save();
      
      canvasCtx.lineWidth = 5;
      canvasCtx.strokeStyle = isAligned ? 'rgba(0, 255, 204, 0.8)' : 'rgba(255, 255, 255, 0.3)';
      
      // 1. 畫頭部橢圓
      canvasCtx.beginPath();
      canvasCtx.ellipse(guideOval.cx, guideOval.cy, guideOval.rx, guideOval.ry, 0, 0, 2 * Math.PI);
      canvasCtx.stroke();
      
      // 2. 畫簡單的肩膀曲線作為參考
      canvasCtx.beginPath();
      const shoulderY = guideOval.cy + guideOval.ry;
      canvasCtx.moveTo(guideOval.cx - guideOval.rx - 20, shoulderY);
      canvasCtx.quadraticCurveTo(guideOval.cx - guideOval.rx - 100, 480, guideOval.cx - 250, 480);
      canvasCtx.moveTo(guideOval.cx + guideOval.rx + 20, shoulderY);
      canvasCtx.quadraticCurveTo(guideOval.cx + guideOval.rx + 100, 480, guideOval.cx + 250, 480);
      canvasCtx.stroke();
      
      // 修正：將 ctx 改為正確的 canvasCtx
      canvasCtx.restore(); 
    }

    function checkFaceAlignment(landmarks) {
      let minX = 1, minY = 1, maxX = 0, maxY = 0;
      [4, 152, 234, 454].forEach(index => {
          const pt = landmarks[index];
          if(pt.x < minX) minX = pt.x;
          if(pt.y < minY) minY = pt.y;
          if(pt.x > maxX) maxX = pt.x;
          if(pt.y > maxY) maxY = pt.y;
      });
      
      const faceCenterPx = {
          x: ((minX + maxX) / 2) * canvasElement.width,
          y: ((minY + maxY) / 2) * canvasElement.height
      };
      const faceWidthPx = (maxX - minX) * canvasElement.width;
      
      const dx = Math.abs(faceCenterPx.x - guideOval.cx);
      const dy = Math.abs(faceCenterPx.y - guideOval.cy);
      const centerTolerance = 40; 
      const isCenterOK = (dx < centerTolerance && dy < centerTolerance);
      
      const targetWidth = guideOval.rx * 1.8;
      const sizeTolerance = 0.25; 
      const isSizeOK = (Math.abs(faceWidthPx - targetWidth) < targetWidth * sizeTolerance);

      return (isCenterOK && isSizeOK);
    }

    function onResults(results) {
      loadingMsg.style.display = 'none';
      canvasCtx.save();
      
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        
        isAligned = checkFaceAlignment(landmarks);

        if (isAligned) {
            statusLamp.classList.add('active');
            if(brushProgress < MAX_PROGRESS) {
                statusText.innerText = "綠燈，開始刷牙動作！";
                statusText.style.color = "#00ffcc";
            } else {
                statusText.innerText = "✨ 刷牙完成！";
                statusText.style.color = "#ffcc00";
            }

            let minX = 1, minY = 1, maxX = 0, maxY = 0;
            mouthIndices.forEach(index => {
              const pt = landmarks[index];
              if(pt.x < minX) minX = pt.x;
              if(pt.y < minY) minY = pt.y;
              if(pt.x > maxX) maxX = pt.x;
              if(pt.y > maxY) maxY = pt.y;
            });

            const padding = 30; 
            const pxMinX = Math.max(0, Math.floor(minX * canvasElement.width) - padding);
            const pxMinY = Math.max(0, Math.floor(minY * canvasElement.height) - padding);
            const pxMaxX = Math.min(canvasElement.width, Math.floor(maxX * canvasElement.width) + padding);
            const pxMaxY = Math.min(canvasElement.height, Math.floor(maxY * canvasElement.height) + padding);
            
            const roiWidth = pxMaxX - pxMinX;
            const roiHeight = pxMaxY - pxMinY;

            if (roiWidth > 0 && roiHeight > 0) {
              const currentImageData = canvasCtx.getImageData(pxMinX, pxMinY, roiWidth, roiHeight);
              
              if (lastImageData && lastImageData.width === roiWidth && lastImageData.height === roiHeight) {
                 let diffScore = 0;
                 for(let i = 0; i < currentImageData.data.length; i += 16) {
                     diffScore += Math.abs(currentImageData.data[i] - lastImageData.data[i]);
                 }
                 
                 if (diffScore > MOTION_THRESHOLD) {
                     brushProgress += 0.5; 
                     if (brushProgress > MAX_PROGRESS) brushProgress = MAX_PROGRESS;
                 }
                 
                 progressBar.style.width = brushProgress + '%';
                 progressPercent.innerText = Math.floor(brushProgress) + '%';
              }
              lastImageData = currentImageData; 
            }

            canvasCtx.strokeStyle = 'rgba(0, 255, 204, 0.8)';
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeRect(pxMinX, pxMinY, roiWidth, roiHeight);

        } else {
            statusLamp.classList.remove('active');
            statusText.innerText = "請將臉部對齊準心輪廓...";
            statusText.style.color = "#aaa";
        }

      } else {
        isAligned = false; 
        statusLamp.classList.remove('active');
        statusText.innerText = "找不到臉部，請對準鏡頭...";
        statusText.style.color = "#ff3366";
      }

      drawStaticGuide();

      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 640,
      height: 480
    });
    
    camera.start();
  </script>
</body>
</html>
