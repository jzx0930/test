<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刷牙教學 - 動態偵測 (改良版)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #222;
      color: white;
      margin: 0;
      padding: 20px;
    }
    
    /* UI 面板移到上方，並加上更顯眼的設計 */
    .ui-panel {
      width: 640px;
      padding: 15px;
      background-color: #333;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 15px; /* 與下方視訊拉開距離 */
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .progress-container {
      width: 100%;
      height: 30px;
      background-color: #555;
      border-radius: 15px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      transition: width 0.1s;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-family: monospace;
      font-size: 16px;
      color: #00ffcc;
    }

    /* 視訊容器 */
    .container {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      background-color: #000;
    }
    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* 鏡像翻轉 */
    }

    /* 載入中的文字提示 */
    #loading-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>🦷 刷牙動作偵測</h2>
  
  <div class="ui-panel">
    <div style="font-size: 18px; font-weight: bold;">狀態：<span id="status-text" style="color: #ffcc00;">等待模型載入...</span></div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="stats">
      <span>動態差值: <span id="diff-score" style="font-size: 20px; color: #fff;">0</span></span>
      <span>閥值: 15000</span>
    </div>
  </div>

  <div class="container">
    <div id="loading-msg">⏳ AI 模型下載與啟動中...<br><span style="font-size: 16px; color: #aaa;">(首次開啟約需幾秒鐘，請允許相機權限)</span></div>
    <video id="input_video" autoplay playsinline style="display:none;"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const progressBar = document.getElementById('progress-bar');
    const diffScoreText = document.getElementById('diff-score');
    const statusText = document.getElementById('status-text');
    const loadingMsg = document.getElementById('loading-msg');

    let lastImageData = null;
    let brushProgress = 0;
    const MAX_PROGRESS = 100;
    const MOTION_THRESHOLD = 15000; 

    const mouthIndices = [0, 13, 14, 17, 37, 39, 40, 61, 78, 80, 81, 82, 84, 87, 88, 91, 95, 146, 178, 181, 191, 267, 269, 270, 291, 308, 310, 311, 312, 314, 317, 318, 321, 324, 375, 402, 405, 415];

    function onResults(results) {
      // 隱藏載入文字
      loadingMsg.style.display = 'none';

      canvasCtx.save();
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        if(brushProgress < MAX_PROGRESS) {
            statusText.innerText = "✅ 偵測到嘴巴，請在紅框內來回刷牙！";
            statusText.style.color = "#00ffcc";
        }
        
        const landmarks = results.multiFaceLandmarks[0];
        
        let minX = 1, minY = 1, maxX = 0, maxY = 0;
        mouthIndices.forEach(index => {
          const pt = landmarks[index];
          if(pt.x < minX) minX = pt.x;
          if(pt.y < minY) minY = pt.y;
          if(pt.x > maxX) maxX = pt.x;
          if(pt.y > maxY) maxY = pt.y;
        });

        const padding = 30; 
        const pxMinX = Math.max(0, Math.floor(minX * canvasElement.width) - padding);
        const pxMinY = Math.max(0, Math.floor(minY * canvasElement.height) - padding);
        const pxMaxX = Math.min(canvasElement.width, Math.floor(maxX * canvasElement.width) + padding);
        const pxMaxY = Math.min(canvasElement.height, Math.floor(maxY * canvasElement.height) + padding);
        
        const roiWidth = pxMaxX - pxMinX;
        const roiHeight = pxMaxY - pxMinY;

        if (roiWidth > 0 && roiHeight > 0) {
          const currentImageData = canvasCtx.getImageData(pxMinX, pxMinY, roiWidth, roiHeight);
          
          if (lastImageData && lastImageData.width === roiWidth && lastImageData.height === roiHeight) {
             let diffScore = 0;
             for(let i = 0; i < currentImageData.data.length; i += 16) {
                 diffScore += Math.abs(currentImageData.data[i] - lastImageData.data[i]);
             }
             
             diffScoreText.innerText = diffScore;

             if (diffScore > MOTION_THRESHOLD) {
                 brushProgress += 0.5; 
                 if (brushProgress > MAX_PROGRESS) brushProgress = MAX_PROGRESS;
                 canvasCtx.strokeStyle = '#00ffcc'; // 綠框表示有刷牙動作
             } else {
                 canvasCtx.strokeStyle = '#ff3366'; // 紅框表示靜止
             }
             
             progressBar.style.width = brushProgress + '%';
             if(brushProgress >= MAX_PROGRESS) {
                statusText.innerText = "✨ 刷牙完成！";
                statusText.style.color = "#ffcc00";
             }
          }
          lastImageData = currentImageData; 
        }

        canvasCtx.lineWidth = 3;
        canvasCtx.strokeRect(pxMinX, pxMinY, roiWidth, roiHeight);

      } else {
        statusText.innerText = "⚠️ 找不到臉部，請對準鏡頭...";
        statusText.style.color = "#ff3366";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 640,
      height: 480
    });
    
    camera.start();
  </script>
</body>
</html>
